<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/jokenpo.css">
    <title>Web Jokenpo</title>
</head>
<body>
    <dialog id="modal_resultado">
        <h1>Você ganhou</h1>
        <button commandFor="modal_resultado" command="close">Fechar</button>
    </dialog>

    <div id="container">
        <img src="img/pedra.png" alt="Adversário" id="adversario" class="personagem">
        <img src="img/pedra.png" alt="Jogador" id="jogador" class="personagem">
        <div id="opcoes_jogadas">
            <div class="jogadas" id="pedra">
                <img src="img/pedra.png" alt="Pedra">
            </div>
            <div class="jogadas" id="papel">
                <img src="img/papel.png" alt="Papel">
            </div>
            <div class="jogadas" id="tesoura">
                <img src="img/tesoura.png" alt="Tesoura">
            </div>
        </div>
    </div>
</body>
</html>
